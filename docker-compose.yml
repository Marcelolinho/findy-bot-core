services:
  redis-cache:
    image: redis:7-alpine
    container_name: findy-redis-cache
    restart: unless-stopped
    command: redis-server --requirepass marcelo --maxmemory 128mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "marcelo", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  redis-data: